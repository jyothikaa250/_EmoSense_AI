<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EmoSense AI</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f172a; /* cleaner dark tech background */
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            background: linear-gradient(to right, #00f5a0, #00d9f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            margin-left: 30px;
            font-weight: 500;
            transition: 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: #00f5a0;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0%;
            height: 2px;
            background: #00f5a0;
            transition: 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 40px 20px;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 13px;
            color: #94a3b8;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* Smooth fade effect */
        .content {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>

<body>

<nav>
    <div class="logo">EmoSense AI</div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/analyze/">Analyze</a>
        <a href="/dashboard/">Dashboard</a>
        <a href="/about/">About</a>
    </div>
</nav>
{% if messages %}
<div class="toast-container">
    {% for message in messages %}
        <div class="toast-message">
            {{ message }}
        </div>
    {% endfor %}
</div>

<script>
setTimeout(() => {
    const toast = document.querySelector(".toast-container");
    if (toast) {
        toast.style.opacity = "0";
        toast.style.transform = "translateY(-20px)";
    }
}, 2500);
</script>
{% endif %}

<div class="content">

 
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 EmoSense AI • Powered by Machine Learning • Developed by Jyothika
</footer>

</body>
</html>
